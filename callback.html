<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Autenticando TikTok...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; background: #000; color: #fff; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #fe2c55;
               border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #aaa; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Conectando ao TikTok...</p>

  <script>
    /**
     * TikTok redireciona para esta página com ?code=...&state=...
     * Repassamos TODOS os parâmetros para o backend local (http://localhost:8000)
     * sem nenhum processamento — o backend faz o trabalho real.
     */
    (function () {
      var params = window.location.search; // ex: ?code=ABC&state=XYZ
      var backendCallback = 'http://localhost:8000/auth/tiktok/callback';

      if (!params) {
        document.querySelector('p').textContent =
          'Nenhum parâmetro recebido. Tente conectar novamente.';
        return;
      }

      // Redireciona o navegador para o backend local
      window.location.href = backendCallback + params;
    })();
  </script>
</body>
</html>
